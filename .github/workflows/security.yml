name: Security Scans

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  # Secret detection with Gitleaks
  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Gitleaks - Secret Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.gitleaks.outcome }}" == "success" ]; then
            echo ":white_check_mark: **No secrets detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **Secrets detected! Review the findings below.**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ github.workspace }}/gitleaks-results.sarif" ]; then
            LEAK_COUNT=$(jq '[.runs[].results[]] | length' "${{ github.workspace }}/gitleaks-results.sarif" 2>/dev/null || echo "0")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Findings | $LEAK_COUNT |" >> $GITHUB_STEP_SUMMARY
          fi

  # Static analysis with Semgrep
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep
        run: |
          semgrep scan --config auto --sarif --output semgrep-results.sarif . 2>&1 | tee semgrep-output.txt
          semgrep scan --config auto --text . 2>&1 | tee semgrep-readable.txt || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Semgrep - Static Analysis (SAST)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep-results.sarif ]; then
            FINDING_COUNT=$(cat semgrep-results.sarif | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo "0")
            if [ "$FINDING_COUNT" = "0" ]; then
              echo ":white_check_mark: **No issues found**" >> $GITHUB_STEP_SUMMARY
            else
              echo ":warning: **$FINDING_COUNT issue(s) found**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep-readable.txt ]; then
            echo "<details><summary>Full Semgrep Output</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat semgrep-readable.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # Vulnerability scanning with Trivy
  trivy-fs:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy filesystem scan
        run: |
          trivy fs --format sarif --output trivy-results.sarif --severity CRITICAL,HIGH,MEDIUM .
          trivy fs --format table --severity CRITICAL,HIGH,MEDIUM . | tee trivy-table.txt || true

      - name: Summary
        if: always()
        run: |
          echo "## Trivy - Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.sarif ]; then
            VULN_COUNT=$(jq '[.runs[].results[]] | length' trivy-results.sarif 2>/dev/null || echo "0")
            if [ "$VULN_COUNT" = "0" ]; then
              echo ":white_check_mark: **No vulnerabilities found** (CRITICAL/HIGH/MEDIUM)" >> $GITHUB_STEP_SUMMARY
            else
              echo ":warning: **$VULN_COUNT vulnerability(ies) found**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-table.txt ]; then
            echo "<details><summary>Full Trivy Output</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-table.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # Dependency audit with npm
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --json > npm-audit.json 2>&1 || true
          npm audit 2>&1 | tee npm-audit.txt || true

      - name: Run OSV-Scanner
        id: osv
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        with:
          scan-args: |-
            --recursive
            --output=/github/workspace/osv-scanner-results.sarif
            --format=sarif
            .

      - name: Summary
        if: always()
        run: |
          echo "## Dependency Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### npm audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f npm-audit.json ]; then
            TOTAL=$(jq '.metadata.vulnerabilities | to_entries | map(.value) | add // 0' npm-audit.json 2>/dev/null || echo "0")
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json 2>/dev/null || echo "0")
            HIGH=$(jq '.metadata.vulnerabilities.high // 0' npm-audit.json 2>/dev/null || echo "0")
            MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' npm-audit.json 2>/dev/null || echo "0")
            LOW=$(jq '.metadata.vulnerabilities.low // 0' npm-audit.json 2>/dev/null || echo "0")
            if [ "$TOTAL" = "0" ]; then
              echo ":white_check_mark: **No vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
            else
              echo ":warning: **$TOTAL vulnerability(ies) found**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
              echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
              echo "| Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
              echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f npm-audit.txt ]; then
            echo "<details><summary>Full npm audit output</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat npm-audit.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### OSV-Scanner" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f osv-scanner-results.sarif ]; then
            OSV_COUNT=$(jq '[.runs[].results[]] | length' osv-scanner-results.sarif 2>/dev/null || echo "0")
            if [ "$OSV_COUNT" = "0" ]; then
              echo ":white_check_mark: **No vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
            else
              echo ":warning: **$OSV_COUNT vulnerability(ies) found**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| ID | Package | Severity |" >> $GITHUB_STEP_SUMMARY
              echo "|----|---------|----------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.runs[].results[] | "| \(.ruleId) | \(.message.text | split(" ") | .[0:3] | join(" ")) | \(.level // "unknown") |"' osv-scanner-results.sarif 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
            fi
          else
            echo ":grey_question: OSV-Scanner results not available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2
        with:
          sarif_file: osv-scanner-results.sarif
          category: osv-scanner

  # CodeQL analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5e7a52feb2a3dfb87f88be2af33b9e2275f48de6 # codeql-bundle-v2.24.2
        with:
          category: codeql

      - name: Summary
        if: always()
        run: |
          echo "## CodeQL - Code Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":white_check_mark: CodeQL analysis completed. Results available in the **Security > Code scanning** tab." >> $GITHUB_STEP_SUMMARY
