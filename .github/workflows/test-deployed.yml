name: Test Deployed Game

# Trigger after a successful deployment
# This workflow runs E2E tests against the live deployed version
on:
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
    branches: [main]

jobs:
  e2e-test:
    name: E2E Tests on Deployed Game
    runs-on: ubuntu-latest

    # Only run if the triggering workflow (Deploy) succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Security: Pin to full SHA for supply chain security
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Security: Pin to full SHA for supply chain security
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests against live deployment
        run: npm run test:e2e -- --baseURL https://m3ssana.github.io/swampfire/
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Comment deployment test status
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **All E2E tests passed** — deployed game is fully functional" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some E2E tests failed** — review test report for details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Test artifacts: [playwright-report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY
          fi
